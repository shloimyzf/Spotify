<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPulse Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e5e7eb; }
        .spotify-green { color: #1DB954; }
        .spotify-bg { background-color: #1DB954; }
        .spotify-bg:hover { background-color: #1ed760; }
        .card-bg { background-color: #181818; border: 1px solid #282828; }
        .card-bg:active { background-color: #282828; transform: scale(0.98); }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-start p-4 select-none">

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center py-4 border-b border-zinc-800 mb-6">
        <h1 class="text-xl font-bold tracking-tight">Stream<span class="spotify-green">Pulse</span></h1>
        <button id="logout-btn" class="bg-zinc-800 hover:bg-zinc-700 text-white text-sm font-semibold px-4 py-2 rounded-full transition hidden">
            Disconnect
        </button>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-4xl flex flex-col items-center">
        
        <!-- Error Banner -->
        <div id="error-banner" class="w-full card-bg border-red-900 rounded-xl p-4 mb-6 text-red-400 text-sm hidden">
            <p class="font-bold mb-1">Application Error:</p>
            <p id="error-message"></p>
        </div>

        <!-- Landing View -->
        <div id="landing-view" class="text-center my-16 max-w-md hidden">
            <h2 class="text-3xl font-extrabold mb-4">Track your streams.</h2>
            <p class="text-zinc-400 mb-8 text-sm">An installable dashboard to view your recent streaming history and listening metrics instantly.</p>
            <button onclick="loginWithSpotifyClick()" class="spotify-bg text-black font-bold text-base px-8 py-4 rounded-full shadow-lg transition">
                Connect Spotify Account
            </button>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="w-full hidden">
            
            <!-- Smart Features & Metrics Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                <div class="card-bg rounded-xl p-4 text-center flex flex-col justify-center min-h-[100px]">
                    <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1">Current Vibe</p>
                    <p id="stat-vibe" class="text-sm font-bold spotify-green">Analyzing...</p>
                </div>
                <div class="card-bg rounded-xl p-4 text-center flex flex-col justify-center min-h-[100px]">
                    <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1">Top Genres</p>
                    <p id="stat-genres" class="text-xs font-bold text-white line-clamp-2">Analyzing...</p>
                </div>
                <div class="card-bg rounded-xl p-4 text-center flex flex-col justify-center min-h-[100px]">
                    <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1">Energy Level</p>
                    <p id="stat-energy" class="text-sm font-bold text-white">Calculating...</p>
                </div>
                <div class="card-bg rounded-xl p-4 text-center flex flex-col justify-center min-h-[100px]">
                    <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1">Haze Factor</p>
                    <p id="stat-baked" class="text-sm font-bold text-amber-500">Scanning...</p>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold tracking-wide">Recent History <span class="text-xs font-normal text-zinc-500">(Tap to play)</span></h2>
                <span id="track-count" class="text-xs text-zinc-400 bg-zinc-800 px-2.5 py-1 rounded-full">0 tracks</span>
            </div>
            
            <!-- Tracks -->
            <div id="tracks-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </div>
    </main>

    <script>
        const CLIENT_ID = '997e4ee06e624c7aaf77a45f30e74394'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        const SCOPE = 'user-read-recently-played';

        const logoutBtn = document.getElementById('logout-btn');
        const landingView = document.getElementById('landing-view');
        const dashboardView = document.getElementById('dashboard-view');
        const tracksList = document.getElementById('tracks-list');
        const trackCount = document.getElementById('track-count');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');

        const statVibe = document.getElementById('stat-vibe');
        const statGenres = document.getElementById('stat-genres');
        const statEnergy = document.getElementById('stat-energy');
        const statBaked = document.getElementById('stat-baked');

        function showUIError(msg) {
            errorMessage.innerText = msg;
            errorBanner.classList.remove('hidden');
        }

        async function init() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err));
            }

            const args = new URLSearchParams(window.location.search);
            const code = args.get('code');

            if (code) {
                const token = await exchangeCodeForToken(code);
                if (token && token !== 'undefined') {
                    localStorage.setItem('access_token', token);
                }
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const token = localStorage.getItem('access_token');
            if (token && token !== 'undefined') { 
                showDashboard(token); 
            } else { 
                localStorage.clear();
                showLanding(); 
            }
        }

        function showLanding() {
            landingView.classList.remove('hidden');
            dashboardView.classList.add('hidden');
            logoutBtn.classList.add('hidden');
        }

        async function showDashboard(token) {
            landingView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            
            logoutBtn.onclick = () => { localStorage.clear(); window.location.reload(); };
            await fetchDashboardData(token);
        }

        async function fetchDashboardData(token) {
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/recently-played?limit=50', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.status === 401) { 
                    localStorage.clear(); 
                    showLanding(); 
                    return; 
                }

                if (!response.ok) {
                    const errInfo = await response.json().catch(() => ({}));
                    throw new Error(`Spotify Profile Error (${response.status}): ${errInfo.error?.message || 'Access Denied'}`);
                }

                const data = await response.json();
                const items = data.items || [];

                if (items.length === 0) {
                    renderEmptyState();
                    return;
                }

                // Batch lookup artist details to get genres
                const artistIds = [...new Set(items.map(item => item.track.artists[0].id))].slice(0, 50).join(',');
                let artistGenreMap = {};
                if (artistIds) {
                    const artistsResponse = await fetch(`https://api.spotify.com/v1/artists?ids=${artistIds}`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (artistsResponse.ok) {
                        const artistsData = await artistsResponse.getJson ? await artistsResponse.json() : await artistsResponse.json();
                        (artistsData.artists || []).forEach(artist => {
                            if(artist) artistGenreMap[artist.id] = artist.genres;
                        });
                    }
                }

                // Batch lookup audio features
                const trackIds = items.map(item => item.track.id).join(',');
                let trackFeaturesMap = {};
                if (trackIds) {
                    const featuresResponse = await fetch(`https://api.spotify.com/v1/audio-features?ids=${trackIds}`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (featuresResponse.ok) {
                        const featuresData = await featuresResponse.json();
                        (featuresData.audio_features || []).forEach(feat => {
                            if (feat) trackFeaturesMap[feat.id] = feat;
                        });
                    }
                }

                processSmartMetrics(items, artistGenreMap, trackFeaturesMap);

            } catch (err) { 
                showUIError(err.message);
                renderEmptyState();
            }
        }

        function processSmartMetrics(items, artistGenreMap, trackFeaturesMap) {
            tracksList.innerHTML = '';
            trackCount.innerText = `${items.length} tracks`;

            let totalEnergy = 0;
            let totalValence = 0; 
            let genreCounts = {};
            let validFeatureCount = 0;
            let hazyTracksCount = 0;

            items.forEach(item => {
                if (!item.track) return;
                const track = item.track;
                const features = trackFeaturesMap[track.id];
                const mainArtistId = track.artists[0]?.id;
                const genres = artistGenreMap[mainArtistId] || [];

                genres.forEach(g => { genreCounts[g] = (genreCounts[g] || 0) + 1; });

                if (features) {
                    totalEnergy += features.energy;
                    totalValence += features.valence;
                    validFeatureCount++;

                    const isSlow = features.tempo < 110;
                    const isAcousticOrDreamy = features.acousticness > 0.4 || features.instrumentalness > 0.15;
                    const isLowEnergy = features.energy < 0.52;
                    
                    if (isLowEnergy && (isSlow || isAcousticOrDreamy)) {
                        hazyTracksCount++;
                    }
                }

                const albumArt = track.album?.images[1]?.url || 'https://via.placeholder.com/150';
                const trackName = track.name;
                const artistName = track.artists.map(a => a.name).join(', ');
                const playedAt = new Date(item.played_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const trackUrl = track.external_urls?.spotify;

                const card = document.createElement('div');
                card.className = 'card-bg rounded-xl p-3 flex items-center space-x-3 cursor-pointer transition duration-150 transform active:scale-95';
                if (trackUrl) card.setAttribute('onclick', `window.open('${trackUrl}', '_blank')`);
                card.innerHTML = `
                    <img src="${albumArt}" class="w-12 h-12 rounded-lg shadow-md object-cover flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-white truncate text-sm">${trackName}</p>
                        <p class="text-xs text-zinc-400 truncate">${artistName}</p>
                    </div>
                    <div class="text-right text-xs text-zinc-500 flex-shrink-0">
                        <p class="font-medium text-zinc-400">${playedAt}</p>
                    </div>
                `;
                tracksList.appendChild(card);
            });

            const avgEnergy = validFeatureCount > 0 ? (totalEnergy / validFeatureCount) : 0;
            const avgValence = validFeatureCount > 0 ? (totalValence / validFeatureCount) : 0;

            const sortedGenres = Object.keys(genreCounts).sort((a,b) => genreCounts[b] - genreCounts[a]).slice(0, 3);
            statGenres.innerText = sortedGenres.length > 0 ? sortedGenres.join(', ') : 'Eclectic';

            statEnergy.innerText = `${Math.round(avgEnergy * 100)}%`;

            let vibe = "Balanced";
            if (avgEnergy > 0.7 && avgValence > 0.6) vibe = "Hype / Electric";
            else if (avgEnergy > 0.6 && avgValence <= 0.4) vibe = "Intense / Dark";
            else if (avgEnergy <= 0.4 && avgValence > 0.5) vibe = "Chill / Melodic";
            else if (avgEnergy <= 0.4 && avgValence <= 0.4) vibe = "Somber / Moody";
            else if (avgEnergy > 0.4 && avgEnergy <= 0.7 && avgValence > 0.4) vibe = "Smooth Floating";
            statVibe.innerText = vibe;

            const hazePercentage = items.length > 0 ? Math.round((hazyTracksCount / items.length) * 100) : 0;
            let highStatus = "Clear Headed ☕";
            if (hazePercentage > 70) highStatus = "In Orbit 🪐";
            else if (hazePercentage > 45) highStatus = "Baked 🌲";
            else if (hazePercentage > 20) highStatus = "Zoned Out 😶‍orig;";
            else if (hazePercentage > 5) highStatus = "Chilled 🌊";
            statBaked.innerText = highStatus;
        }

        function renderEmptyState() {
            statVibe.innerText = "Unknown";
            statGenres.innerText = "None";
            statEnergy.innerText = "0%";
            statBaked.innerText = "Unknown";
        }

        async function loginWithSpotifyClick() {
            const verifier = generateRandomString(128);
            localStorage.setItem('code_verifier', verifier);
            const challenge = await generateCodeChallenge(verifier);
            
            const params = new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: SCOPE,
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'S256',
                code_challenge: challenge
            });
            window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
        }

        async function exchangeCodeForToken(code) {
            try {
                const codeVerifier = localStorage.getItem('code_verifier');
                const params = new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier
                });

                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(`Token Exchange Failed: ${errData.error_description || response.statusText}`);
                }

                const data = await response.json();
                return data.access_token;
            } catch (e) {
                showUIError(e.message);
                return null;
            }
        }

        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return Array.from(values, x => possible[x % possible.length]).join('');
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        init();
    </script>
</body>
</html>
