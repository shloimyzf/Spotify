<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPulse - Spotify History</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e5e7eb; }
        .spotify-green { color: #1DB954; }
        .spotify-bg { background-color: #1DB954; }
        .spotify-bg:hover { background-color: #1ed760; }
        .card-bg { background-color: #181818; border: 1px solid #282828; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-start p-6">

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center py-6 border-b border-zinc-800 mb-8">
        <h1 class="text-2xl font-bold tracking-tight">Stream<span class="spotify-green">Pulse</span></h1>
        <button id="auth-btn" class="spotify-bg text-black font-semibold px-6 py-2 rounded-full transition hidden">
            Connect Spotify
        </button>
        <button id="logout-btn" class="bg-zinc-800 hover:bg-zinc-700 text-white font-semibold px-6 py-2 rounded-full transition hidden">
            Disconnect
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="w-full max-w-4xl flex flex-col items-center">
        <!-- Landing State -->
        <div id="landing-view" class="text-center my-12 max-w-md hidden">
            <h2 class="text-3xl font-extrabold mb-4">See what you've been spinning.</h2>
            <p class="text-zinc-400 mb-8">Connect your account securely to view your live, 50 most recently played tracks directly from Spotify.</p>
            <button onclick="loginWithSpotifyClick()" class="spotify-bg text-black font-bold text-lg px-8 py-4 rounded-full shadow-lg transition">
                Connect with Spotify
            </button>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="w-full hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold tracking-wide">Recently Played Tracks</h2>
                <span id="track-count" class="text-sm text-zinc-400 bg-zinc-800 px-3 py-1 rounded-full">0 tracks</span>
            </div>
            
            <!-- Tracks Container -->
            <div id="tracks-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Tracks inject here dynamically -->
            </div>
        </div>
    </main>

    <script>
        // CONFIGURATION
        const CLIENT_ID = 'YOUR_SPOTIFY_CLIENT_ID'; // <-- REPLACE THIS WITH YOUR CLIENT ID
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        const SCOPE = 'user-read-recently-played';

        // UI Element Selectors
        const authBtn = document.getElementById('auth-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const landingView = document.getElementById('landing-view');
        const dashboardView = document.getElementById('dashboard-view');
        const tracksList = document.getElementById('tracks-list');
        const trackCount = document.getElementById('track-count');

        // APP INITIALIZATION
        async function init() {
            const args = new URLSearchParams(window.location.search);
            const code = args.get('code');

            if (code) {
                // We have a code back from Spotify, exchange it for an access token
                const token = await exchangeCodeForToken(code);
                if (token) {
                    localStorage.setItem('access_token', token);
                    // Clear code parameter from browser address bar cleanly
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }

            const token = localStorage.getItem('access_token');
            if (token) {
                showDashboard(token);
            } else {
                showLanding();
            }
        }

        function showLanding() {
            landingView.classList.remove('hidden');
            authBtn.classList.remove('hidden');
            dashboardView.classList.add('hidden');
            logoutBtn.classList.add('hidden');
        }

        async function showDashboard(token) {
            landingView.classList.add('hidden');
            authBtn.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            
            logoutBtn.onclick = () => {
                localStorage.clear();
                showLanding();
            };

            await fetchRecentlyPlayed(token);
        }

        // SPOTIFY API CALLS
        async function fetchRecentlyPlayed(token) {
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/recently-played?limit=50', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.status === 401) {
                    // Token expired or invalid, reset login state
                    localStorage.clear();
                    showLanding();
                    return;
                }

                const data = await response.json();
                renderTracks(data.items);
            } catch (err) {
                console.error("Error pulling history:", err);
            }
        }

        function renderTracks(items) {
            tracksList.innerHTML = '';
            trackCount.innerText = `${items.length} tracks`;

            if(items.length === 0) {
                tracksList.innerHTML = `<p class="text-zinc-500">No history found or no music listened to recently.</p>`;
                return;
            }

            items.forEach(item => {
                const track = item.track;
                const albumArt = track.album.images[1]?.url || 'https://via.placeholder.com/150';
                const trackName = track.name;
                const artistName = track.artists.map(a => a.name).join(', ');
                const playedAt = new Date(item.played_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const playedDate = new Date(item.played_at).toLocaleDateString([], { month: 'short', day: 'numeric' });

                const card = document.createElement('div');
                card.className = 'card-bg rounded-lg p-4 flex items-center space-x-4 hover:bg-zinc-800 transition duration-200';
                card.innerHTML = `
                    <img src="${albumArt}" alt="${trackName}" class="w-16 h-16 rounded shadow-md object-cover flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-white truncate text-base">${trackName}</p>
                        <p class="text-sm text-zinc-400 truncate">${artistName}</p>
                    </div>
                    <div class="text-right text-xs text-zinc-500 flex-shrink-0">
                        <p class="font-medium text-zinc-400">${playedAt}</p>
                        <p>${playedDate}</p>
                    </div>
                `;
                tracksList.appendChild(card);
            });
        }

        // SECURE PKCE AUTHENTICATION LOGIC FLOW
        async function loginWithSpotifyClick() {
            const verifier = generateRandomString(128);
            localStorage.setItem('code_verifier', verifier);

            const challenge = await generateCodeChallenge(verifier);
            
            const params = new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: SCOPE,
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'S256',
                code_challenge: challenge
            });

            window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
        }

        async function exchangeCodeForToken(code) {
            const codeVerifier = localStorage.getItem('code_verifier');

            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                grant_type: 'authorization_code',
                code: code,
                redirect_uri: REDIRECT_URI,
                code_verifier: codeVerifier
            });

            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            const data = await response.json();
            return data.access_token;
        }

        // CRYPTOGRAPHY UTILITIES FOR CODE CHALLENGE
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return Array.from(values, x => possible[x % possible.length]).join('');
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        // Launch app on load
        init();
    </script>
</body>
</html>
