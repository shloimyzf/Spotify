<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPulse</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e5e7eb; }
        .spotify-green { color: #1DB954; }
        .spotify-bg { background-color: #1DB954; }
        .spotify-bg:hover { background-color: #1ed760; }
        .card-bg { background-color: #181818; border: 1px solid #282828; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-start p-4 select-none">

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center py-4 border-b border-zinc-800 mb-6">
        <h1 class="text-xl font-bold tracking-tight">Stream<span class="spotify-green">Pulse</span></h1>
        <button id="logout-btn" class="bg-zinc-800 hover:bg-zinc-700 text-white text-sm font-semibold px-4 py-2 rounded-full transition hidden">
            Disconnect
        </button>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-4xl flex flex-col items-center">
        
        <!-- Landing View -->
        <div id="landing-view" class="text-center my-16 max-w-md hidden">
            <h2 class="text-3xl font-extrabold mb-4">Track your streams.</h2>
            <p class="text-zinc-400 mb-8 text-sm">An installable dashboard to view your recent streaming history and listening metrics instantly.</p>
            <button onclick="loginWithSpotifyClick()" class="spotify-bg text-black font-bold text-base px-8 py-4 rounded-full shadow-lg transition">
                Connect Spotify Account
            </button>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="w-full hidden">
            
            <!-- Metrics Grid -->
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="card-bg rounded-xl p-4 text-center">
                    <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1">Time Streamed</p>
                    <p id="stat-time" class="text-xl font-bold spotify-green">0m</p>
                </div>
                <div class="card-bg rounded-xl p-4 text-center">
                    <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1">Artists Explored</p>
                    <p id="stat-artists" class="text-xl font-bold text-white">0</p>
                </div>
                <div class="card-bg rounded-xl p-4 text-center">
                    <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-1">Heavy Rotation</p>
                    <p id="stat-top-artist" class="text-sm font-bold text-white truncate">None</p>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold tracking-wide">Recent History</h2>
                <span id="track-count" class="text-xs text-zinc-400 bg-zinc-800 px-2.5 py-1 rounded-full">0 tracks</span>
            </div>
            
            <!-- Tracks -->
            <div id="tracks-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </div>
    </main>

    <script>
        // INSERT YOUR VALID CLIENT ID HERE
        const CLIENT_ID = 'YOUR_SPOTIFY_CLIENT_ID'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        const SCOPE = 'user-read-recently-played';

        const logoutBtn = document.getElementById('logout-btn');
        const landingView = document.getElementById('landing-view');
        const dashboardView = document.getElementById('dashboard-view');
        const tracksList = document.getElementById('tracks-list');
        const trackCount = document.getElementById('track-count');

        // Stats elements
        const statTime = document.getElementById('stat-time');
        const statArtists = document.getElementById('stat-artists');
        const statTopArtist = document.getElementById('stat-top-artist');

        async function init() {
            // Register PWA Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.log("SW registration failed", err));
            }

            const args = new URLSearchParams(window.location.search);
            const code = args.get('code');

            if (code) {
                const token = await exchangeCodeForToken(code);
                if (token) {
                    localStorage.setItem('access_token', token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }

            const token = localStorage.getItem('access_token');
            if (token) { showDashboard(token); } else { showLanding(); }
        }

        function showLanding() {
            landingView.classList.remove('hidden');
            dashboardView.classList.add('hidden');
            logoutBtn.classList.add('hidden');
        }

        async function showDashboard(token) {
            landingView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            
            logoutBtn.onclick = () => { localStorage.clear(); showLanding(); };
            await fetchRecentlyPlayed(token);
        }

        async function fetchRecentlyPlayed(token) {
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/recently-played?limit=50', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.status === 401) { localStorage.clear(); showLanding(); return; }
                const data = await response.json();
                processMetricsAndRender(data.items);
            } catch (err) { console.error(err); }
        }

        function processMetricsAndRender(items) {
            tracksList.innerHTML = '';
            trackCount.innerText = `${items.length} tracks`;

            if(items.length === 0) {
                tracksList.innerHTML = `<p class="text-zinc-500 text-sm">No recent tracks found.</p>`;
                return;
            }

            let totalMs = 0;
            let artistCounts = {};

            items.forEach(item => {
                const track = item.track;
                totalMs += track.duration_ms;
                
                track.artists.forEach(art => {
                    artistCounts[art.name] = (artistCounts[art.name] || 0) + 1;
                });

                const albumArt = track.album.images[1]?.url || 'https://via.placeholder.com/150';
                const trackName = track.name;
                const artistName = track.artists.map(a => a.name).join(', ');
                const playedAt = new Date(item.played_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                const card = document.createElement('div');
                card.className = 'card-bg rounded-xl p-3 flex items-center space-x-3';
                card.innerHTML = `
                    <img src="${albumArt}" class="w-12 h-12 rounded-lg shadow-md object-cover flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-white truncate text-sm">${trackName}</p>
                        <p class="text-xs text-zinc-400 truncate">${artistName}</p>
                    </div>
                    <div class="text-right text-xs text-zinc-500 flex-shrink-0">
                        <p class="font-medium text-zinc-400">${playedAt}</p>
                    </div>
                `;
                tracksList.appendChild(card);
            });

            // Calculate Metrics
            const totalMinutes = Math.round(totalMs / 60000);
            const uniqueArtistsCount = Object.keys(artistCounts).length;
            const topArtist = Object.keys(artistCounts).reduce((a, b) => artistCounts[a] > artistCounts[b] ? a : b, "None");

            // Update UI Stats
            statTime.innerText = `${totalMinutes}m`;
            statArtists.innerText = uniqueArtistsCount;
            statTopArtist.innerText = topArtist;
        }

        async function loginWithSpotifyClick() {
            const verifier = generateRandomString(128);
            localStorage.setItem('code_verifier', verifier);
            const challenge = await generateCodeChallenge(verifier);
            
            const params = new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: SCOPE,
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'S256',
                code_challenge: challenge
            });
            window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
        }

        async function exchangeCodeForToken(code) {
            const codeVerifier = localStorage.getItem('code_verifier');
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                grant_type: 'authorization_code',
                code: code,
                redirect_uri: REDIRECT_URI,
                code_verifier: codeVerifier
            });

            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
            const data = await response.json();
            return data.access_token;
        }

        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return Array.from(values, x => possible[x % possible.length]).join('');
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        init();
    </script>
</body>
</html>
